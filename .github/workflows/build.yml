name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install cython buildozer
          
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.1.0,kivymd==1.1.1/g' buildozer.spec
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Instagram-Test-APK
          path: bin/*.apk
